<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bank Python - Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; }
        .card { background: white; width: 300px; margin: 50px auto; padding: 20px; border-radius: 10px; shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        .saldo { font-size: 24px; color: green; font-weight: bold; }
        button { background: #007bff; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; margin: 5px; }
        input { padding: 8px; width: 80%; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Olá, {{ nome }}!</h1>
        <p>Seu saldo atual:</p>
        <p class="saldo">R$ {{ saldo }}</p>

        <hr>

        <h3>Operações</h3>
        <form action="/operacao" method="POST">
            <input type="number" name="valor" placeholder="Valor (Ex: 50)" required>
            <br>
            <button type="submit" name="tipo" value="sacar">Sacar</button>
            <button type="submit" name="tipo" value="depositar" style="background: #28a745;">Depositar</button>
        </form>

        <br>
        <a href="/">Sair da conta</a>
    </div>
</body>
</html>
